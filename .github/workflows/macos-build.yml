name: Build macOS Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download ImGui
      run: |
        mkdir -p thirdparty
        git clone --depth 1 https://github.com/ocornut/imgui.git thirdparty/imgui

    - name: Install Dependencies
      run: |
        brew update
        brew install sdl2 cmake dylibbundler

    # configure macOS and OpenGL
    - name: Configure CMake
    
      run: |
    
    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_PREFIX_PATH="/opt/homebrew"

    - name: Build Application
      run: cmake --build build --config Release -j 4

    # linking SDL2
    - name: Bundle Dynamic Libraries
      run: |
        # creates libs folder
        mkdir -p build/libs
        
        # dylibbundler included all required libraries, e.g. SDL2, 
        # copies libraries to "build/libs/" and changes path to "@executable_path"
        dylibbundler -od -b -x build/HIDTester -d build/libs/ -p @executable_path/libs/

    - name: Package Release
      run: |
        VERSION="${{ github.ref_name }}"
        DIR_NAME="HIDTester-$VERSION-macOS"
        mkdir -p "$DIR_NAME"

        cp build/HIDTester "$DIR_NAME/"
        cp -r build/libs "$DIR_NAME/" 
        cp README.md "$DIR_NAME/" || true
        cp LICENSE "$DIR_NAME/" || true

        zip -r "$DIR_NAME.zip" "$DIR_NAME/"

    - name: Upload Artifact to Actions
      uses: actions/upload-artifact@v4
      with:
        name: HIDTester-${{ github.ref_name }}-macOS
        path: HIDTester-${{ github.ref_name }}-macOS/

    - name: Upload to GitHub Release
      if: github.event_name == 'release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload ${{ github.ref_name }} "HIDTester-${{ github.ref_name }}-macOS.zip"
